<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#000000">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Clock</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" type="text/css"  href="../../styles/fontcss.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
    <div class="back">
            <a class="knopka" href="../../index.html">
                back
            </a>
            <span>:</span>
            <a class="knopka" href="flip_clock_less.html">
                less
            </a>
    </div>
 
    <div class="clock-container">
        <div class="top-info">
            <div class="weather">
                <section class="ajax-section">
                    <div class="cities"></div>
                </section>
            </div>
            <div class="date-day">
                <div class="date">--.--.----</div>
                <div class="day">--</div>
            </div>
        </div>
        <div class="flip-clock">
            <div class="flip-section">
                <div class="flip-number top">00</div>
                <div class="flip-number bottom">00</div>
            </div>
            <div class="flip-section">
                <div class="flip-number top">00</div>
                <div class="flip-number bottom">00</div>
            </div>
        </div>
        <div class="wcontainer">
          <div class="bottom-banner">
            <section class="ajax-section">
              <div class="cities"></div>
            </section>
            <form>
              <input type="text" placeholder="Search for a city" id="search">
              <button type="submit" class="search-button"><i class="fas fa-search" style="color: #c0bfbc;"></i></button>
              <span class="msg"></span>
            </form>
          </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script src="flip_weather.js"></script>
  </body>
  </html>
